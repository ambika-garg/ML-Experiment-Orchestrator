version: "3.9"

services:
  # ── PostgreSQL Database ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: orchestrator
      POSTGRES_PASSWORD: orchestrator
      POSTGRES_DB: ml_orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MLflow Tracking Server ───────────────────────────────────────────
  mlflow:
    build:
      context: .
      dockerfile: Dockerfile.mlflow
    ports:
      - "5001:5001"
    volumes:
      - mlflow_data:/mlruns

  # ── FastAPI Application ──────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://orchestrator:orchestrator@postgres:5432/ml_orchestrator
      MLFLOW_TRACKING_URI: http://mlflow:5001
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      LLM_MODEL: ${LLM_MODEL:-gemini-2.5-flash}
      MAX_ITERATIONS: ${MAX_ITERATIONS:-3}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
    volumes:
      - ../data:/app/data

  # ── Streamlit Dashboard ──────────────────────────────────────────────
  streamlit:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: ["streamlit", "run", "ui/app.py",
              "--server.port", "8501",
              "--server.address", "0.0.0.0"]
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://app:8000/api/v1
    depends_on:
      - app

volumes:
  postgres_data:
  mlflow_data:
